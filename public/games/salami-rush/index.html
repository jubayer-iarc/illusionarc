<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Unity Web Player | Boss Rush</title>

  <meta
    name="viewport"
    content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <style>
    :root {
      --game-aspect: 9 / 16;
      --frame-gap: 12px;
      --frame-radius: 18px;
      --frame-max-width: 460px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #000;
    }

    #unity-shell {
      width: 100vw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--frame-gap);
      overflow: hidden;
      background: #000;
    }

    #unity-frame {
      position: relative;
      aspect-ratio: var(--game-aspect);
      height: min(calc(100dvh - (var(--frame-gap) * 2)), 100%);
      width: auto;
      max-width: min(
        calc((100dvh - (var(--frame-gap) * 2)) * 9 / 16),
        calc(100vw - (var(--frame-gap) * 2)),
        var(--frame-max-width)
      );
      max-height: calc(100dvh - (var(--frame-gap) * 2));
      background: #000;
      overflow: hidden;
      border-radius: var(--frame-radius);
    }

    @media (max-aspect-ratio: 9/16) {
      #unity-frame {
        width: min(calc(100vw - (var(--frame-gap) * 2)), var(--frame-max-width));
        height: auto;
        max-height: calc(100dvh - (var(--frame-gap) * 2));
      }
    }

    @media (min-width: 900px) {
      #unity-frame {
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.06),
          0 24px 80px rgba(0,0,0,0.45);
      }
    }

    #unity-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000 url("Build/boss2.jpg") center / cover no-repeat;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    #unity-canvas.ready {
      opacity: 1;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.18);
      transition: opacity 0.15s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px 20px;
      text-align: center;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.14);
      border-top-color: #22d3ee;
      animation: spin 0.75s linear infinite;
    }

    .loading-text {
      color: rgba(255,255,255,0.95);
      font-size: 15px;
      line-height: 1.5;
      font-weight: 600;
      letter-spacing: 0.1px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.45);
      max-width: 260px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner {
        animation-duration: 1.4s;
      }

      #unity-canvas,
      #loading-overlay {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div id="unity-shell">
    <div id="unity-frame">
      <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>

        <div id="loading-overlay">
          <div class="loader-box">
            <div class="spinner"></div>
            <div class="loading-text">ধৈর্য ধরে অপেক্ষা করুন, গেমটি লোড হচ্ছে</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="Build/boss2.loader.js"></script>
  <script>
    (function () {
      var canvas = document.querySelector("#unity-canvas");
      var loadingOverlay = document.querySelector("#loading-overlay");
      var unityFrame = document.querySelector("#unity-frame");
      var unityContainer = document.querySelector("#unity-container");

      var midCheckpointTimer = null;
      var screenCheckpoints = {
        load: null,
        mid: null,
        game_over: null
      };

      function hideLoader() {
        canvas.classList.add("ready");
        loadingOverlay.classList.add("hidden");

        setTimeout(function () {
          if (loadingOverlay && loadingOverlay.parentNode) {
            loadingOverlay.remove();
          }
        }, 180);
      }

      function nowIso() {
        try {
          return new Date().toISOString();
        } catch (e) {
          return null;
        }
      }

      function getOrientation() {
        if (window.screen && window.screen.orientation && window.screen.orientation.type) {
          return String(window.screen.orientation.type);
        }

        if (typeof window.orientation !== "undefined") {
          var angle = Number(window.orientation) || 0;
          return Math.abs(angle) === 90 ? "landscape-legacy" : "portrait-legacy";
        }

        return window.innerWidth > window.innerHeight ? "landscape" : "portrait";
      }

      function rectData(el) {
        if (!el || typeof el.getBoundingClientRect !== "function") return null;
        var rect = el.getBoundingClientRect();

        return {
          width: Math.round(rect.width || 0),
          height: Math.round(rect.height || 0),
          top: Math.round(rect.top || 0),
          left: Math.round(rect.left || 0)
        };
      }

      function collectScreenSnapshot(label) {
        return {
          label: label,
          capturedAt: nowIso(),
          screenWidth: Number(window.screen && window.screen.width) || null,
          screenHeight: Number(window.screen && window.screen.height) || null,
          availWidth: Number(window.screen && window.screen.availWidth) || null,
          availHeight: Number(window.screen && window.screen.availHeight) || null,
          innerWidth: Number(window.innerWidth) || null,
          innerHeight: Number(window.innerHeight) || null,
          outerWidth: Number(window.outerWidth) || null,
          outerHeight: Number(window.outerHeight) || null,
          clientWidth: Number(document.documentElement && document.documentElement.clientWidth) || null,
          clientHeight: Number(document.documentElement && document.documentElement.clientHeight) || null,
          visualViewportWidth:
            window.visualViewport && typeof window.visualViewport.width === "number"
              ? Math.round(window.visualViewport.width)
              : null,
          visualViewportHeight:
            window.visualViewport && typeof window.visualViewport.height === "number"
              ? Math.round(window.visualViewport.height)
              : null,
          devicePixelRatio: Number(window.devicePixelRatio) || 1,
          orientation: getOrientation(),
          userAgent: navigator.userAgent || "",
          frameRect: rectData(unityFrame),
          containerRect: rectData(unityContainer),
          canvasRect: rectData(canvas)
        };
      }

      function postCheckpointToParent(label, snapshot) {
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(
              {
                type: "IA_SCREEN_CHECKPOINT",
                checkpoint: label,
                payload: snapshot
              },
              "*"
            );
          }
        } catch (e) {}
      }

      function saveCheckpoint(label) {
        var snapshot = collectScreenSnapshot(label);
        screenCheckpoints[label] = snapshot;
        postCheckpointToParent(label, snapshot);
        return snapshot;
      }

      window.IA_RecordMidCheckpoint = function () {
        return saveCheckpoint("mid");
      };

      window.IA_RecordGameOverCheckpoint = function () {
        return saveCheckpoint("game_over");
      };

      window.IA_GetSubmissionMeta = function () {
        return {
          screen_checkpoints: JSON.parse(JSON.stringify(screenCheckpoints))
        };
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content =
          "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover";
        document.getElementsByTagName("head")[0].appendChild(meta);

        document.body.style.textAlign = "left";
      }

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/boss2.data.br",
        frameworkUrl: "Build/boss2.framework.js.br",
        codeUrl: "Build/boss2.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "illusion Lab",
        productName: "Boss Rush",
        productVersion: "0.11"
      }).then(function (unityInstance) {
        window.unityInstance = unityInstance;
        hideLoader();

        saveCheckpoint("load");

        if (midCheckpointTimer) {
          clearTimeout(midCheckpointTimer);
        }

        midCheckpointTimer = setTimeout(function () {
          if (!screenCheckpoints.mid) {
            saveCheckpoint("mid");
          }
        }, 45000);
      }).catch(function (message) {
        alert(message);
      });
    })();
  </script>
</body>
</html>
