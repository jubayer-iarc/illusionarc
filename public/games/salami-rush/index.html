<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity Web Player | Boss Rush</title>

    <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #unity-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #000 url('Build/boss2.jpg') center / cover no-repeat;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            opacity: 0;
            transition: opacity 0.12s ease;
        }

        #unity-canvas.ready {
            opacity: 1;
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.18);
            z-index: 5;
            transition: opacity 0.12s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.14);
            border-top-color: #22d3ee;
            animation: spin 0.75s linear infinite;
            box-sizing: border-box;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .spinner {
                animation-duration: 1.4s;
            }

            #unity-canvas,
            #loading-overlay {
                transition: none;
            }
        }
    </style>
</head>

<body>
<div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>
</div>

<script src="Build/boss2.loader.js" defer></script>
<script>
    window.addEventListener("load", () => {
        const canvas = document.querySelector("#unity-canvas");
        const loadingOverlay = document.querySelector("#loading-overlay");

        function hideLoader() {
            canvas.classList.add("ready");
            loadingOverlay.classList.add("hidden");

            setTimeout(() => {
                loadingOverlay.remove();
            }, 140);
        }

        // const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        createUnityInstance(canvas, {
            arguments: [],
            dataUrl: "Build/boss2.data.unityweb",
            frameworkUrl: "Build/boss2.framework.js.unityweb",
            codeUrl: "Build/boss2.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "illusion Lab",
            productName: "Boss Rush",
            productVersion: "0.11",
            // devicePixelRatio: isMobile ? 1 : Math.min(window.devicePixelRatio || 1, 1.5)
        })
            .then(() => {
                hideLoader();
            })
            .catch((message) => {
                alert(message);
            });
    });
</script>
</body>
</html>
