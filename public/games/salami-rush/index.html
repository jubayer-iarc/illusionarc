<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity Web Player | Boss Rush</title>

    <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #unity-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #000 url('Build/boss2.jpg') center / cover no-repeat;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            opacity: 0;
            transition: opacity 0.18s ease;
        }

        #unity-canvas.ready {
            opacity: 1;
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0.12),
                    rgba(0, 0, 0, 0.32)
            );
            z-index: 5;
            transition: opacity 0.18s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 18px 20px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.22);
        }

        .spinner {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.16);
            border-top-color: #22d3ee;
            animation: spin 0.8s linear infinite;
            box-sizing: border-box;
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.92);
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .progress-track {
            width: 180px;
            height: 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #22d3ee;
            transition: width 0.15s linear;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .spinner {
                animation-duration: 1.6s;
            }

            #unity-canvas,
            #loading-overlay,
            .progress-fill {
                transition: none;
            }
        }
    </style>
</head>

<body>
<div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="loading-overlay">
        <div class="loader-wrap">
            <div class="spinner"></div>
            <div class="loading-text" id="loading-text">Loading game... 0%</div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>
</div>

<script src="Build/boss2.loader.js" defer></script>
<script>
    window.addEventListener("load", () => {
        const canvas = document.querySelector("#unity-canvas");
        const loadingOverlay = document.querySelector("#loading-overlay");
        const loadingText = document.querySelector("#loading-text");
        const progressFill = document.querySelector("#progress-fill");

        function hideLoader() {
            canvas.classList.add("ready");
            loadingOverlay.classList.add("hidden");

            setTimeout(() => {
                if (loadingOverlay) loadingOverlay.remove();
            }, 220);
        }

        // const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        const config = {
            arguments: [],
            dataUrl: "Build/boss2.data.unityweb",
            frameworkUrl: "Build/boss2.framework.js.unityweb",
            codeUrl: "Build/boss2.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "illusion Lab",
            productName: "Boss Rush",
            productVersion: "0.11",

            // Helps reduce startup/render cost on many devices
            // devicePixelRatio: isMobile ? 1 : Math.min(window.devicePixelRatio || 1, 1.5)
        };

        // Delay one frame so browser can paint splash first
        requestAnimationFrame(() => {
            createUnityInstance(canvas, config, (progress) => {
                const percent = Math.round(progress * 100);
                progressFill.style.width = percent + "%";
                loadingText.textContent = "Loading game... " + percent + "%";
            })
                .then(() => {
                    hideLoader();
                })
                .catch((message) => {
                    loadingText.textContent = "Failed to load game";
                    alert(message);
                });
        });
    });
</script>
</body>
</html>
