<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Unity Web Player | Boss Rush</title>

  <meta
    name="viewport"
    content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #unity-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      background: url('Build/boss2.jpg') center / cover no-repeat;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    #unity-canvas.ready {
      opacity: 1;
    }

    /* Fullscreen loading overlay */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,0.20),
          rgba(0,0,0,0.45)
        );
      z-index: 5;
      transition: opacity 0.18s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      border-radius: 20px;
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .spinner {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.18);
      border-top-color: #22d3ee;
      animation: spin 0.8s linear infinite;
      box-sizing: border-box;
    }

    .loading-text {
      color: rgba(255,255,255,0.9);
      font-family: Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0.3px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Optional: reduce motion support */
    @media (prefers-reduced-motion: reduce) {
      .spinner {
        animation-duration: 1.6s;
      }

      #unity-canvas,
      #loading-overlay {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="loading-overlay">
      <div class="loader-wrap">
        <div class="spinner"></div>
        <div class="loading-text">Loading game...</div>
      </div>
    </div>
  </div>

  <script src="Build/boss2.loader.js"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");
    const container = document.querySelector("#unity-container");
    const loadingOverlay = document.querySelector("#loading-overlay");

    function resize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
    }

    function hideLoader() {
      canvas.classList.add("ready");
      loadingOverlay.classList.add("hidden");

      setTimeout(() => {
        if (loadingOverlay) loadingOverlay.remove();
      }, 220);
    }

    resize();
    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", () => setTimeout(resize, 200));

    createUnityInstance(canvas, {
      arguments: [],
      dataUrl: "Build/boss2.data.unityweb",
      frameworkUrl: "Build/boss2.framework.js.unityweb",
      codeUrl: "Build/boss2.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "illusion Lab",
      productName: "Boss Rush",
      productVersion: "0.11",
      devicePixelRatio: 1
    }, () => {
      // Ignore actual progress visually
      // We keep spinner running until Unity is fully ready
    })
    .then(() => {
      hideLoader();
    })
    .catch((message) => {
      alert(message);
    });
  </script>
</body>
</html>
