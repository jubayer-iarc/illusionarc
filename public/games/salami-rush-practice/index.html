<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Unity Web Player | Salami-Rush-Practice</title>

  <meta
    name="viewport"
    content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <link rel="shortcut icon" href="TemplateData/favicon.ico" />

  <style>
    :root {
      --game-aspect: 9 / 16;
      --game-max-width: 460px;
      --frame-gap: 12px;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #unity-shell {
      width: 100vw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--frame-gap);
      box-sizing: border-box;
      background: #000;
      overflow: hidden;
    }

    #unity-frame {
      position: relative;
      aspect-ratio: var(--game-aspect);
      height: min(calc(100dvh - (var(--frame-gap) * 2)), 100%);
      width: auto;
      max-width: min(
        calc((100dvh - (var(--frame-gap) * 2)) * 9 / 16),
        calc(100vw - (var(--frame-gap) * 2)),
        var(--game-max-width)
      );
      max-height: calc(100dvh - (var(--frame-gap) * 2));
      background: #000;
      overflow: hidden;
      border-radius: 18px;
    }

    @media (max-aspect-ratio: 9/16) {
      #unity-frame {
        width: min(calc(100vw - (var(--frame-gap) * 2)), var(--game-max-width));
        height: auto;
        max-height: calc(100dvh - (var(--frame-gap) * 2));
      }
    }

    @media (min-width: 900px) {
      #unity-frame {
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.06),
          0 24px 80px rgba(0,0,0,0.45);
      }
    }

    #unity-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      opacity: 0;
      transition: opacity 0.12s ease;
    }

    #unity-canvas.ready {
      opacity: 1;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.18);
      z-index: 6;
      transition: opacity 0.12s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px 20px;
      text-align: center;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.14);
      border-top-color: #22d3ee;
      animation: spin 0.75s linear infinite;
      box-sizing: border-box;
    }

    .loading-text {
      color: rgba(255,255,255,0.95);
      font-size: 15px;
      line-height: 1.5;
      font-weight: 600;
      letter-spacing: 0.1px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.45);
      max-width: 260px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #unity-warning {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 8;
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner {
        animation-duration: 1.4s;
      }

      #unity-canvas,
      #loading-overlay {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div id="unity-shell">
    <div id="unity-frame">
      <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>

        <div id="loading-overlay">
          <div class="loader-box">
            <div class="spinner"></div>
            <div class="loading-text">ধৈর্য ধরে অপেক্ষা করুন, গেমটি লোড হচ্ছে</div>
          </div>
        </div>

        <div id="unity-warning"></div>
      </div>
    </div>
  </div>

  <script>
    var canvas = document.querySelector("#unity-canvas");
    var loadingOverlay = document.querySelector("#loading-overlay");
    var warningBanner = document.querySelector("#unity-warning");

    function hideLoader() {
      canvas.classList.add("ready");
      loadingOverlay.classList.add("hidden");

      setTimeout(function () {
        if (loadingOverlay && loadingOverlay.parentNode) {
          loadingOverlay.remove();
        }
      }, 140);
    }

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      var div = document.createElement("div");
      div.innerHTML = msg;
      div.style.marginBottom = "8px";
      div.style.padding = "10px 12px";
      div.style.borderRadius = "10px";
      div.style.fontSize = "13px";
      div.style.fontFamily = "Arial, sans-serif";
      div.style.boxSizing = "border-box";

      if (type === "error") {
        div.style.background = "rgba(220, 38, 38, 0.92)";
        div.style.color = "#fff";
      } else {
        div.style.background = "rgba(250, 204, 21, 0.95)";
        div.style.color = "#111";

        setTimeout(function () {
          if (div.parentNode === warningBanner) {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }
        }, 5000);
      }

      warningBanner.appendChild(div);
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/boss3.loader.js";

    var config = {
      arguments: [],
      dataUrl: buildUrl + "/boss3.data.br",
      frameworkUrl: buildUrl + "/boss3.framework.js.br",
      codeUrl: buildUrl + "/boss3.wasm.br",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Salami-Rush-Practice",
      productVersion: "0.1.0",
      showBanner: unityShowBanner
      // config.devicePixelRatio = 1;
      // config.matchWebGLToCanvasSize = false;
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement("meta");
      meta.name = "viewport";
      meta.content =
        "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover";
      document.getElementsByTagName("head")[0].appendChild(meta);
    }

    canvas.style.background =
      "url('" + buildUrl + "/boss3.jpg') center / cover no-repeat";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = function () {
      createUnityInstance(canvas, config)
        .then(function () {
          hideLoader();
        })
        .catch(function (message) {
          alert(message);
        });
    };

    script.onerror = function () {
      alert("Failed to load Unity loader script.");
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
