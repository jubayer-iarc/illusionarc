<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Unity Web Player | Block Smash</title>

  <meta name="viewport"
        content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* iframe-safe sizing */
    #unity-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      background: url('Build/bs.jpg') center / cover no-repeat;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      outline: none;

      opacity: 0;
      transition: opacity 0.18s ease;
    }

    #unity-canvas.ready {
      opacity: 1;
    }

    /* Round loader overlay */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.20),
        rgba(0, 0, 0, 0.45)
      );
      z-index: 5;
      transition: opacity 0.18s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .spinner {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.18);
      border-top-color: rgba(34, 211, 238, 0.95);
      animation: spin 0.8s linear infinite;
      box-sizing: border-box;
    }

    .loading-text {
      color: rgba(255, 255, 255, 0.9);
      font-family: Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0.3px;
    }

    /* Unity warning banner */
    #unity-warning {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 999;
      display: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 14px;
    }

    #unity-warning > div {
      margin-bottom: 8px;
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.92);
      color: #000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner {
        animation-duration: 1.6s;
      }

      #unity-canvas,
      #loading-overlay {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="unity-warning"></div>

    <div id="loading-overlay">
      <div class="loader-wrap">
        <div class="spinner"></div>
        <div class="loading-text">Loading game...</div>
      </div>
    </div>
  </div>

  <script src="Build/bs.loader.js"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");
    const container = document.querySelector("#unity-container");
    const loadingOverlay = document.querySelector("#loading-overlay");

    function unityShowBanner(msg, type) {
      const warningBanner = document.querySelector("#unity-warning");
      const div = document.createElement("div");
      div.textContent = msg;

      if (type === "error") {
        div.style.background = "rgba(255, 0, 0, 0.85)";
        div.style.color = "#fff";
      } else if (type === "warning") {
        div.style.background = "rgba(255, 215, 0, 0.95)";
        div.style.color = "#000";
        setTimeout(() => {
          if (div.parentNode) div.parentNode.removeChild(div);
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }, 5000);
      }

      warningBanner.appendChild(div);
      warningBanner.style.display = "block";
    }

    function resize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
    }

    function hideLoader() {
      canvas.classList.add("ready");
      loadingOverlay.classList.add("hidden");

      setTimeout(() => {
        if (loadingOverlay) loadingOverlay.remove();
      }, 220);
    }

    resize();
    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", () => setTimeout(resize, 200));

    const config = {
      arguments: [],
      dataUrl: "Build/bs.data",
      frameworkUrl: "Build/bs.framework.js",
      codeUrl: "Build/bs.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "illusion Lab",
      productName: "Block Smash",
      productVersion: "0.9",
      showBanner: unityShowBanner,
      // devicePixelRatio: 1
    };

    createUnityInstance(canvas, config, () => {
      /* no visible progress */
    }).then(() => {
      hideLoader();
    }).catch((message) => {
      alert(message);
    });
  </script>
</body>
</html>
