<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes"
    />
    <title>Unity Web Player | Boss Rush</title>

    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        position: fixed;
        inset: 0;
        text-align: left;
        font-family: Arial, Helvetica, sans-serif;
        touch-action: none;
      }

      #unity-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
      }

      #unity-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
        background: url("Build/boss2.jpg") center center / cover no-repeat #000;
      }

      #unity-loading {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.78);
      }

      #loading-card {
        width: min(320px, 88vw);
        padding: 18px;
        border-radius: 18px;
        background: rgba(17, 24, 39, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        color: #fff;
        text-align: center;
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.45);
      }

      #loading-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      #progress-track {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.12);
      }

      #progress-bar {
        width: 0%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #22c55e, #3b82f6);
        transition: width 0.15s ease;
      }

      #loading-subtitle {
        margin-top: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
      }

      #unity-error {
        position: absolute;
        left: max(12px, env(safe-area-inset-left));
        right: max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 35;
        display: none;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(127, 29, 29, 0.94);
        color: #fff;
        font-size: 13px;
        line-height: 1.4;
        border: 1px solid rgba(255, 255, 255, 0.12);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="unity-loading">
        <div id="loading-card">
          <div id="loading-title">Loading Boss Rush...</div>
          <div id="progress-track">
            <div id="progress-bar"></div>
          </div>
          <div id="loading-subtitle">Please wait while the game starts</div>
        </div>
      </div>

      <div id="unity-error"></div>
    </div>

    <script src="Build/boss2.loader.js"></script>
    <script>
      (function () {
        var canvas = document.getElementById("unity-canvas");
        var loading = document.getElementById("unity-loading");
        var progressBar = document.getElementById("progress-bar");
        var errorBox = document.getElementById("unity-error");
        var unityInstance = null;

        function getSearchParams() {
          try {
            return new URLSearchParams(window.location.search || "");
          } catch (e) {
            return new URLSearchParams("");
          }
        }

        var params = getSearchParams();

        var sessionContext = {
          gameSlug: String(params.get("gameSlug") || ""),
          tournamentSlug: String(params.get("tournamentSlug") || ""),
          sessionId: String(params.get("sessionId") || ""),
          sessionNonce: String(params.get("sessionNonce") || ""),
          deviceType: String(params.get("deviceType") || ""),
          startedAt: String(params.get("startedAt") || ""),
          expiresAt: String(params.get("expiresAt") || ""),
          autostart: String(params.get("autostart") || "")
        };

        window.IA_SESSION_CONTEXT = sessionContext;

        function showError(message) {
          errorBox.textContent = message || "Failed to load the game.";
          errorBox.style.display = "block";
        }

        function hideError() {
          errorBox.style.display = "none";
          errorBox.textContent = "";
        }

        function hideLoading() {
          loading.classList.add("hidden");
        }

        function updateProgress(progress) {
          var pct = Math.max(0, Math.min(1, Number(progress) || 0)) * 100;
          progressBar.style.width = pct + "%";
        }

        function requestFullscreen() {
          var el = document.documentElement;

          if (canvas && typeof canvas.requestFullscreen === "function") {
            canvas.requestFullscreen().catch(function () {});
            return;
          }

          if (el.requestFullscreen) {
            el.requestFullscreen().catch(function () {});
          } else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
          } else if (el.msRequestFullscreen) {
            el.msRequestFullscreen();
          }
        }

        function tryLockOrientation() {
          if (!screen.orientation || typeof screen.orientation.lock !== "function") return;
          screen.orientation.lock("landscape").catch(function () {});
        }

        function applyCanvasFit() {
          canvas.style.position = "absolute";
          canvas.style.inset = "0";
          canvas.style.width = "100%";
          canvas.style.height = "100%";
        }

        document.addEventListener("fullscreenchange", function () {
          if (document.fullscreenElement) {
            tryLockOrientation();
          }
        });

        window.addEventListener("resize", applyCanvasFit);
        window.addEventListener("orientationchange", function () {
          setTimeout(applyCanvasFit, 120);
        });

        hideError();
        applyCanvasFit();

        console.log("[Boss Rush] Session context:", sessionContext);

        createUnityInstance(
          canvas,
          {
            arguments: [],
            dataUrl: "Build/boss2.data.unityweb",
            frameworkUrl: "Build/boss2.framework.js.unityweb",
            codeUrl: "Build/boss2.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "illusion Lab",
            productName: "Boss Rush",
            productVersion: "0.11"
          },
          function (progress) {
            updateProgress(progress);
          }
        )
          .then(function (instance) {
            unityInstance = instance;
            window.unityInstance = unityInstance;
            hideLoading();

            if (sessionContext.autostart === "1") {
              setTimeout(function () {
                tryLockOrientation();
              }, 150);
            }
          })
          .catch(function (message) {
            var text = typeof message === "string" ? message : "Unable to start Unity.";
            showError(text);
            console.error("[Boss Rush] Unity start failed:", message);
          });

        window.IA_GetSessionContext = function () {
          return {
            gameSlug: sessionContext.gameSlug,
            tournamentSlug: sessionContext.tournamentSlug,
            sessionId: sessionContext.sessionId,
            sessionNonce: sessionContext.sessionNonce,
            deviceType: sessionContext.deviceType,
            startedAt: sessionContext.startedAt,
            expiresAt: sessionContext.expiresAt,
            autostart: sessionContext.autostart
          };
        };

        window.IA_HasSession = function () {
          return !!(sessionContext.sessionId && sessionContext.sessionNonce);
        };

        window.IA_RequestFullscreen = function () {
          requestFullscreen();
        };

        window.addEventListener("message", function (event) {
          if (event.origin !== window.location.origin) return;
          var data = event.data;
          if (!data || typeof data !== "object") return;

          if (data.type === "REQUEST_FULLSCREEN") {
            requestFullscreen();
            tryLockOrientation();
          }
        });
      })();
    </script>
  </body>
</html>
